<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ Speed Test</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>⚡ Speed Test</h1>
            <p>Test your internet connection speed</p>
        </header>

        <main class="main">
            <div class="controls">
                <button id="startBtn" class="btn btn-primary">▶ Start Test</button>
                <button id="resetBtn" class="btn btn-secondary" disabled>↺ Reset</button>
            </div>

            <div id="status" class="status" style="display: none;">
                <p id="statusText">Initializing...</p>
            </div>

            <div id="results" class="results" style="display: none;">
                <div class="result-card">
                    <div class="result-icon">⬇️</div>
                    <div class="result-value">
                        <span id="downloadValue">-</span>
                        <span class="result-unit">Mbps</span>
                    </div>
                    <div class="result-label">Download</div>
                </div>
                <div class="result-card">
                    <div class="result-icon">⬆️</div>
                    <div class="result-value">
                        <span id="uploadValue">-</span>
                        <span class="result-unit">Mbps</span>
                    </div>
                    <div class="result-label">Upload</div>
                </div>
                <div class="result-card">
                    <div class="result-icon">📡</div>
                    <div class="result-value">
                        <span id="latencyValue">-</span>
                        <span class="result-unit">ms</span>
                    </div>
                    <div class="result-label">Latency</div>
                </div>
                <div class="result-card">
                    <div class="result-icon">📊</div>
                    <div class="result-value">
                        <span id="jitterValue">-</span>
                        <span class="result-unit">ms</span>
                    </div>
                    <div class="result-label">Jitter</div>
                </div>
            </div>

            <div id="metaInfo" class="meta-info" style="display: none;">
                <div class="meta-item">
                    <div class="meta-icon">👤</div>
                    <div class="meta-details">
                        <span id="clientValue" class="meta-value">-</span>
                        <span id="ipValue" class="meta-label">-</span>
                    </div>
                </div>
                <div class="meta-item">
                    <div class="meta-icon">🌐</div>
                    <div class="meta-details">
                        <span id="serverValue" class="meta-value">-</span>
                        <span class="meta-label">Cloudflare Server</span>
                    </div>
                </div>
            </div>

            <div id="progress" style="display: none; margin-top: 25px;">
                <div class="progress-bar">
                    <div id="progressFill" class="progress-fill"></div>
                </div>
                <p id="progressText">0%</p>
            </div>
        </main>

        <section class="history">
            <h2>📋 Test History</h2>
            <div id="historyList" class="history-list"></div>
        </section>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
