<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ Speedtest</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>⚡ Speed Test</h1>
            <p>Test your internet connection speed</p>
        </header>

        <main class="main">
            <div class="controls">
                <button id="startBtn" class="btn btn-primary">▶ Start Test</button>
                <button id="resetBtn" class="btn btn-secondary" disabled>↺ Reset</button>
            </div>

            <div id="status" class="status" style="display: none;">
                <p id="statusText">Initializing...</p>
            </div>

            <!-- MAIN RESULTS SECTION WITH 2-COLUMN LAYOUT -->
            <div id="results" class="results-container" style="display: none;">
                <div class="results-grid">
                    <!-- Download Column -->
                    <div class="result-column download-column">
                        <div class="result-header">
                            <span class="result-label">Download</span>
                        </div>
                        <div class="result-value-large">
                            <span id="downloadValue">-</span>
                            <span class="result-unit">Mbps</span>
                        </div>
                        <div class="chart-container">
                            <canvas id="downloadChart"></canvas>
                        </div>
                    </div>

                    <!-- Upload Column -->
                    <div class="result-column upload-column">
                        <div class="result-header">
                            <span class="result-label">Upload</span>
                        </div>
                        <div class="result-value-large">
                            <span id="uploadValue">-</span>
                            <span class="result-unit">Mbps</span>
                        </div>
                        <div class="chart-container">
                            <canvas id="uploadChart"></canvas>
                        </div>
                    </div>
                </div>

                <!-- Secondary Metrics -->
                <div class="secondary-metrics">
                    <div class="metric-card">
                        <div class="metric-icon">📡</div>
                        <div class="metric-label">Latency</div>
                        <div class="metric-value"><span id="latencyValue">-</span> ms</div>
                    </div>
                    <div class="metric-card">
                        <div class="metric-icon">📊</div>
                        <div class="metric-label">Jitter</div>
                        <div class="metric-value"><span id="jitterValue">-</span> ms</div>
                    </div>
                </div>
            </div>

            <!-- SERVER INFO -->
            <div id="serverInfo" class="server-info" style="display:none;">
                <div class="info-card">
                    <div class="info-label">🌐 IP Address</div>
                    <div class="info-value" id="infoIP">-</div>
                </div>
                <div class="info-card">
                    <div class="info-label">🏢 ISP</div>
                    <div class="info-value" id="infoISP">-</div>
                </div>
                <div class="info-card">
                    <div class="info-label">📍 Location</div>
                    <div class="info-value" id="infoCity">-</div>
                </div>
                <div class="info-card">
                    <div class="info-label">🖥️ CF Server</div>
                    <div class="info-value" id="infoServer">-</div>
                </div>
            </div>
        </main>

        <!-- HISTORY SECTION -->
        <section class="history">
            <h2>📋 Test History</h2>
            <div id="historyList" class="history-list"></div>
        </section>
    </div>

    <!-- Chart.js Library -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script type="module" src="app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                    .then(reg => console.log('[SW] Registered:', reg.scope))
                    .catch(err => console.error('[SW] Error:', err));
            });
        }
    </script>
</body>
</html>
